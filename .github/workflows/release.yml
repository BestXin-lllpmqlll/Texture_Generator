name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_script: dist:mac
            asset_glob: release/*.dmg
          - os: windows-latest
            build_script: dist:win
            asset_glob: release/*.exe
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Installer
        run: npm run ${{ matrix.build_script }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload Workflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-installer
          path: |
            release/**
